<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="parent_title">题单管理 - 信息学竞赛练习系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .progress-bar { transition: width 0.5s ease; }
        
        /* 语言切换下拉菜单样式 */
        .lang-switcher { position: relative; display: inline-block; }
        .lang-switcher-btn-inner {
            background: #f3f4f6; border: 1px solid #e5e7eb; color: #374151;
            padding: 6px 12px; border-radius: 10px; cursor: pointer;
            font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px;
            transition: all 0.3s ease;
        }
        .lang-switcher-btn-inner:hover { background: #e5e7eb; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .lang-switcher.open .lang-switcher-btn-inner svg { transform: rotate(180deg); }
        .lang-dropdown {
            position: absolute; top: calc(100% + 8px); right: 0; background: white;
            border: 1px solid #e5e7eb; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); min-width: 160px; overflow: hidden;
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
        }
        .lang-switcher.open .lang-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
        .lang-option { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; transition: all 0.2s ease; color: #374151; font-size: 14px; }
        .lang-option:hover { background: #f3f4f6; }
        .lang-option.active { background: #eef2ff; color: #4f46e5; font-weight: 600; }
        .lang-option .flag { font-size: 18px; }
        .lang-option .check { margin-left: auto; opacity: 0; color: #4f46e5; font-weight: bold; }
        .lang-option.active .check { opacity: 1; }
        .lang-divider { height: 1px; background: #e5e7eb; margin: 4px 0; }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">📚</span>
                <h1 class="text-xl font-bold text-gray-800" data-i18n="parent_title">信息学竞赛练习系统 - 管理后台</h1>
            </div>
            <div class="flex items-center gap-4">
                <!-- 语言切换 -->
                <div class="lang-switcher" id="langSwitcher">
                    <button class="lang-switcher-btn-inner" onclick="toggleLangDropdown()">
                        <span id="currentLangFlag">🇨🇳</span>
                        <span id="currentLangText">简体中文</span>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:14px;height:14px;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div class="lang-dropdown">
                        <div class="lang-option active" data-lang="zh-CN" onclick="switchLang('zh-CN')">
                            <span class="flag">🇨🇳</span>
                            <span>简体中文</span>
                            <span class="check">✓</span>
                        </div>
                        <div class="lang-divider"></div>
                        <div class="lang-option" data-lang="en" onclick="switchLang('en')">
                            <span class="flag">🇺🇸</span>
                            <span>English</span>
                            <span class="check">✓</span>
                        </div>
                    </div>
                </div>
                <span class="text-gray-600"><span data-i18n="welcome">欢迎</span>，<span id="userName">家长</span></span>
                <button onclick="logout()" class="text-red-500 hover:text-red-700 font-medium" data-i18n="nav_logout">退出</button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- 密码题设置区域 -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6 fade-in">
            <h2 class="text-xl font-bold text-gray-800 mb-4" data-i18n="password_question_title">🔑 设置登录密码题</h2>
            <p class="text-sm text-gray-500 mb-4" data-i18n="password_question_desc">设置一道题目，答案的汉语拼音将作为孩子的登录密码</p>
            
            <div id="currentPasswordQuestion" class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-4 hidden">
                <p class="font-bold text-gray-700" data-i18n="current_password_question">当前密码题：</p>
                <p id="currentQuestionText" class="text-indigo-700 mt-1"></p>
                <p id="currentAnswerText" class="text-sm text-gray-500 mt-1"></p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="question_label">问题（例如：昨天读的水浒传人物是谁？）</label>
                    <input type="text" id="passwordQuestion" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        data-i18n="question_placeholder" placeholder="输入密码题">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="answer_label">答案（例如：李逵）</label>
                    <input type="text" id="passwordAnswer" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        data-i18n="answer_placeholder" placeholder="输入答案">
                    <p class="text-xs text-gray-500 mt-1" data-i18n="answer_tip">💡 系统会自动将答案转换为拼音作为密码（如"李逵"→"likui"）</p>
                </div>
                <button onclick="setPasswordQuestion()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition"
                    data-i18n="set_password_btn">
                    设置密码题
                </button>
                <div id="passwordSetStatus" class="hidden"></div>
            </div>
        </div>

        <!-- 上传区域 -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6 fade-in">
            <h2 class="text-xl font-bold text-gray-800 mb-4" data-i18n="upload_title">📤 上传新题单</h2>
            <div class="mb-4 p-4 bg-blue-50 border border-blue-200 rounded-xl">
                <div class="flex items-center gap-3 flex-wrap">
                    <span class="text-2xl">📋</span>
                    <div class="flex-1">
                        <p class="font-bold text-blue-800 mb-1" data-i18n="sample_reference">参考样例</p>
                        <p class="text-sm text-blue-600 mb-2" data-i18n="sample_desc">下载题库格式样例文档，了解如何正确出题</p>
                    </div>
                    <a href="/static/kaotiyangli.md" download="kaotiyangli.md" 
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition flex items-center gap-2">
                        <span>⬇️</span> <span data-i18n="download_sample">下载样例</span>
                    </a>
                    <button onclick="openAIGenerateModal()" 
                        class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-2 px-4 rounded-lg transition flex items-center gap-2 shadow-lg">
                        <span>🤖</span> <span data-i18n="ai_generate_btn">AI出题</span>
                    </button>
                </div>
            </div>
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center" id="uploadArea">
                <div class="text-4xl mb-4">📄</div>
                <p class="text-gray-600 mb-4" data-i18n="upload_desc">选择或拖拽.md格式的题库文件到此处</p>
                <p class="text-sm text-gray-400 mb-4" data-i18n="upload_requirements">文件需包含：题的名字、题目、答案、解题过程、本题考点、复习要点</p>
                <input type="file" id="fileInput" accept=".md" class="hidden" onchange="handleFileSelect(event)">
                <button onclick="document.getElementById('fileInput').click()" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition"
                    data-i18n="upload_btn">
                    选择文件
                </button>
            </div>
            <div id="uploadStatus" class="mt-4 hidden"></div>
        </div>

        <!-- 题单列表 -->
        <div class="bg-white rounded-2xl shadow-xl p-6 fade-in">
            <h2 class="text-xl font-bold text-gray-800 mb-6" data-i18n="manage_title">📋 题单管理</h2>
            
            <div id="questionsList" class="space-y-4">
                <div class="text-center py-12 text-gray-500" data-i18n="loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 进度详情弹窗 -->
    <div id="progressModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-2xl m-4 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800" data-i18n="progress_detail">完成情况详情</h3>
                <button onclick="closeProgressModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <div id="progressContent">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- AI出题弹窗 -->
    <div id="aiGenerateModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-3xl m-4 max-h-[90vh] overflow-y-auto">
            <!-- 步骤1：表单 -->
            <div id="aiFormStep">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-800" data-i18n="ai_generate_title">🤖 AI智能出题</h3>
                    <button onclick="closeAIGenerateModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                </div>
                <p class="text-gray-600 mb-6" data-i18n="ai_generate_desc">填写以下信息，AI将自动为您生成题目</p>
                
                <div class="space-y-6">
                    <!-- 学科 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-3" data-i18n="subject_label">学科</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <button type="button" onclick="selectSubject('math')" class="subject-btn border-2 border-gray-300 rounded-xl p-4 hover:border-blue-500 transition" data-subject="math">
                                <div class="text-3xl mb-2">📐</div>
                                <div class="font-medium" data-i18n="subject_math">数学</div>
                            </button>
                            <button type="button" onclick="selectSubject('cs')" class="subject-btn border-2 border-gray-300 rounded-xl p-4 hover:border-blue-500 transition" data-subject="cs">
                                <div class="text-3xl mb-2">💻</div>
                                <div class="font-medium" data-i18n="subject_cs">计算机</div>
                            </button>
                            <button type="button" onclick="selectSubject('chinese')" class="subject-btn border-2 border-gray-300 rounded-xl p-4 hover:border-blue-500 transition" data-subject="chinese">
                                <div class="text-3xl mb-2">📚</div>
                                <div class="font-medium" data-i18n="subject_chinese">语文</div>
                            </button>
                            <button type="button" onclick="selectSubject('english')" class="subject-btn border-2 border-gray-300 rounded-xl p-4 hover:border-blue-500 transition" data-subject="english">
                                <div class="text-3xl mb-2">🌍</div>
                                <div class="font-medium" data-i18n="subject_english">英语</div>
                            </button>
                        </div>
                    </div>

                    <!-- 年级 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-3" data-i18n="grade_label">年级</label>
                        <div class="grid grid-cols-3 md:grid-cols-6 gap-2">
                            <button type="button" onclick="selectGrade('1')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="1" data-i18n="grade_1">一年级</button>
                            <button type="button" onclick="selectGrade('2')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="2" data-i18n="grade_2">二年级</button>
                            <button type="button" onclick="selectGrade('3')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="3" data-i18n="grade_3">三年级</button>
                            <button type="button" onclick="selectGrade('4')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="4" data-i18n="grade_4">四年级</button>
                            <button type="button" onclick="selectGrade('5')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="5" data-i18n="grade_5">五年级</button>
                            <button type="button" onclick="selectGrade('6')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="6" data-i18n="grade_6">六年级</button>
                            <button type="button" onclick="selectGrade('7')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="7" data-i18n="grade_7">初一</button>
                            <button type="button" onclick="selectGrade('8')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="8" data-i18n="grade_8">初二</button>
                            <button type="button" onclick="selectGrade('9')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="9" data-i18n="grade_9">初三</button>
                            <button type="button" onclick="selectGrade('10')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="10" data-i18n="grade_10">高一</button>
                            <button type="button" onclick="selectGrade('11')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="11" data-i18n="grade_11">高二</button>
                            <button type="button" onclick="selectGrade('12')" class="grade-btn border-2 border-gray-300 rounded-lg p-2 hover:border-blue-500 transition text-sm" data-grade="12" data-i18n="grade_12">高三</button>
                        </div>
                    </div>

                    <!-- 出题范围 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="scope_label">出题范围</label>
                        <textarea id="aiScope" rows="3"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                            data-i18n="scope_placeholder" placeholder="例如：变量、函数、字符串、一维数组、排序、算法；乘法、公倍数、立体几何、三角函数"></textarea>
                    </div>

                    <!-- 题目类型和数量 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-3" data-i18n="question_type_label">出题类型和数量</label>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="border border-gray-300 rounded-xl p-4">
                                <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="single_choice_label">单选题</label>
                                <input type="number" id="singleChoiceCount" min="0" max="20" value="0"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                                    data-i18n="question_count_placeholder" placeholder="数量">
                            </div>
                            <div class="border border-gray-300 rounded-xl p-4">
                                <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="multiple_choice_label">多选题</label>
                                <input type="number" id="multipleChoiceCount" min="0" max="20" value="0"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                                    data-i18n="question_count_placeholder" placeholder="数量">
                            </div>
                            <div class="border border-gray-300 rounded-xl p-4">
                                <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="true_false_label">判断题</label>
                                <input type="number" id="trueFalseCount" min="0" max="20" value="0"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                                    data-i18n="question_count_placeholder" placeholder="数量">
                            </div>
                        </div>
                    </div>

                    <div id="aiFormStatus" class="hidden"></div>

                    <button onclick="generateQuestions()" id="generateBtn"
                        class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg text-lg">
                        <span data-i18n="generate_btn">✨ 生成题目</span>
                    </button>
                </div>
            </div>

            <!-- 步骤2：预览 -->
            <div id="aiPreviewStep" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-800" data-i18n="preview_title">📋 题目预览</h3>
                    <button onclick="closeAIGenerateModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                </div>
                <div id="previewContent" class="bg-gray-50 rounded-xl p-6 max-h-[60vh] overflow-y-auto mb-6">
                    <!-- 动态预览内容 -->
                </div>
                <div class="flex gap-4">
                    <button onclick="backToForm()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-xl transition">
                        <span data-i18n="back_edit_btn">← 返回修改</span>
                    </button>
                    <button onclick="publishQuestions()" id="publishBtn"
                        class="flex-1 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-lg">
                        <span data-i18n="publish_btn">✅ 发布题单</span>
                    </button>
                </div>
                <div id="aiPublishStatus" class="mt-4 hidden"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script>
        // 加载用户信息
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/user/info', { credentials: 'same-origin' });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('userName').textContent = data.name;
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
            }
        }

        // 加载当前密码题
        async function loadCurrentPasswordQuestion() {
            try {
                const response = await fetch('/api/password-question', { credentials: 'same-origin' });
                const data = await response.json();
                
                const container = document.getElementById('currentPasswordQuestion');
                const questionText = document.getElementById('currentQuestionText');
                const answerText = document.getElementById('currentAnswerText');
                
                if (data.hasQuestion) {
                    container.classList.remove('hidden');
                    questionText.textContent = data.question;
                    answerText.textContent = `${t('set_time')}${new Date(data.setTime).toLocaleString(currentLang === 'zh-CN' ? 'zh-CN' : 'en-US')}`;
                } else {
                    container.classList.add('hidden');
                }
            } catch (error) {
                console.error('加载密码题失败:', error);
            }
        }

        // 设置密码题
        async function setPasswordQuestion() {
            const question = document.getElementById('passwordQuestion').value.trim();
            const answer = document.getElementById('passwordAnswer').value.trim();
            const statusDiv = document.getElementById('passwordSetStatus');
            
            if (!question || !answer) {
                statusDiv.className = 'p-4 rounded-lg bg-red-100 text-red-700';
                statusDiv.textContent = t('fill_all_fields');
                statusDiv.classList.remove('hidden');
                return;
            }
            
            try {
                const response = await fetch('/api/parent/password-question', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, answer }),
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.className = 'p-4 rounded-lg bg-green-100 text-green-700';
                    statusDiv.textContent = t('password_set_success') + data.answerPinyin;
                    statusDiv.classList.remove('hidden');
                    
                    document.getElementById('passwordQuestion').value = '';
                    document.getElementById('passwordAnswer').value = '';
                    
                    loadCurrentPasswordQuestion();
                } else {
                    statusDiv.className = 'p-4 rounded-lg bg-red-100 text-red-700';
                    statusDiv.textContent = t('set_failed') + data.message;
                    statusDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('设置密码题失败:', error);
                statusDiv.className = 'p-4 rounded-lg bg-red-100 text-red-700';
                statusDiv.textContent = t('set_failed_retry');
                statusDiv.classList.remove('hidden');
            }
        }

        // 加载题单列表
        async function loadQuestions() {
            try {
                const response = await fetch('/api/questions', { credentials: 'same-origin' });
                const data = await response.json();
                
                const container = document.getElementById('questionsList');
                
                if (!data.success) {
                    container.innerHTML = '<div class="text-center py-12 text-red-500">' + t('load_error') + '</div>';
                    return;
                }
                
                if (data.questions.length === 0) {
                    container.innerHTML = '<div class="text-center py-12 text-gray-500">' + t('no_questions_parent') + '</div>';
                    return;
                }
                
                container.innerHTML = data.questions.map(q => {
                    const createDate = q.createDate ? new Date(q.createDate).toLocaleDateString(currentLang === 'zh-CN' ? 'zh-CN' : 'en-US') : '-';
                    const isStopped = q.stopped === true;
                    
                    return `
                        <div class="border rounded-xl p-6 hover:shadow-lg transition ${isStopped ? 'bg-red-50 border-red-300' : 'bg-white'}">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2">
                                        <h3 class="text-lg font-bold text-gray-800">${q.title}</h3>
                                        ${isStopped ? '<span class="inline-block bg-red-100 text-red-600 text-xs font-bold px-2 py-1 rounded-full border border-red-300">⏹ ' + t('stopped_label') + '</span>' : ''}
                                    </div>
                                    <p class="text-sm text-gray-500 mt-1">${q.totalQuestions}${t('question_count')} · ${t('created_at')} ${createDate}</p>
                                </div>
                            </div>
                            
                            <div class="flex gap-3">
                                <button onclick="${isStopped ? `resumeExam('${q.id}')` : `stopExam('${q.id}')`}" 
                                    class="flex-1 ${isStopped ? 'bg-green-500 hover:bg-green-600' : 'bg-yellow-500 hover:bg-yellow-600'} text-white font-bold py-2 px-4 rounded-lg transition">
                                    ${isStopped ? '▶ ' + t('resume_exam') : '⛔ ' + t('stop_exam')}
                                </button>
                                <button onclick="viewProgress('${q.id}')" 
                                    class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg transition">
                                    📊 ${t('view_progress_btn')}
                                </button>
                                <button onclick="deleteQuestion('${q.id}', '${q.title}')" 
                                    class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg transition">
                                    🗑️ ${t('delete')}
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('加载题单失败:', error);
                document.getElementById('questionsList').innerHTML = 
                    '<div class="text-center py-12 text-red-500">' + t('load_error') + '</div>';
            }
        }

        // 文件上传处理
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.name.endsWith('.md')) {
                showUploadStatus(t('select_md_file'), 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            showUploadStatus(t('uploading'), 'loading');
            
            try {
                const response = await fetch('/api/parent/upload', {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showUploadStatus(t('upload_success', {count: data.questionCount}), 'success');
                    loadQuestions();
                    document.getElementById('fileInput').value = '';
                } else {
                    showUploadStatus(t('upload_error') + data.message, 'error');
                }
            } catch (error) {
                console.error('上传失败:', error);
                showUploadStatus(t('upload_error'), 'error');
            }
        }

        // 显示上传状态
        function showUploadStatus(message, type) {
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.classList.remove('hidden');
            
            let bgClass = 'bg-gray-100 text-gray-700';
            if (type === 'success') bgClass = 'bg-green-100 text-green-700';
            if (type === 'error') bgClass = 'bg-red-100 text-red-700';
            if (type === 'loading') bgClass = 'bg-blue-100 text-blue-700';
            
            statusDiv.className = `p-4 rounded-lg ${bgClass}`;
            statusDiv.textContent = message;
        }

        // 停止作答
        async function stopExam(questionId) {
            if (!confirm(t('confirm_stop'))) {
                return;
            }
            
            try {
                const response = await fetch(`/api/parent/questions/${questionId}/stop`, {
                    method: 'POST',
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(t('stopped_success'));
                    loadQuestions();
                } else {
                    alert(t('operation_failed') + data.message);
                }
            } catch (error) {
                console.error('停止失败:', error);
                alert(t('operation_failed'));
            }
        }

        // 恢复作答
        async function resumeExam(questionId) {
            if (!confirm(t('confirm_resume'))) {
                return;
            }
            
            try {
                const response = await fetch(`/api/parent/questions/${questionId}/resume`, {
                    method: 'POST',
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(t('resumed_success'));
                    loadQuestions();
                } else {
                    alert(t('operation_failed') + data.message);
                }
            } catch (error) {
                console.error('恢复失败:', error);
                alert(t('operation_failed'));
            }
        }

        // 查看完成情况
        async function viewProgress(questionId) {
            try {
                const response = await fetch(`/api/parent/progress/${questionId}`, {
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (!data.success) {
                    alert(t('get_progress_failed'));
                    return;
                }
                
                const modal = document.getElementById('progressModal');
                const content = document.getElementById('progressContent');
                
                if (data.progress.length === 0) {
                    content.innerHTML = '<p class="text-gray-500 text-center py-8">' + t('no_records') + '</p>';
                } else {
                    let html = '';
                    data.progress.forEach(p => {
                        let statusText = t('status_not_started');
                        let statusClass = 'text-gray-500';
                        if (p.status === 'completed') {
                            statusText = t('status_completed');
                            statusClass = 'text-green-600';
                        } else if (p.status === 'in_progress') {
                            statusText = t('status_in_progress');
                            statusClass = 'text-blue-600';
                        } else if (p.status === 'stopped') {
                            statusText = t('status_stopped');
                            statusClass = 'text-red-600';
                        }
                        
                        const completeDate = p.completeDate ? 
                            new Date(p.completeDate).toLocaleString(currentLang === 'zh-CN' ? 'zh-CN' : 'en-US') : '-';
                        const answeredCount = p.questionDetails ? p.questionDetails.filter(q => q.submitted).length : 0;
                        
                        html += `
                            <div class="mb-6 border rounded-xl p-4">
                                <div class="flex justify-between items-center mb-3">
                                    <h4 class="font-bold text-lg">${p.username}</h4>
                                    <span class="${statusClass} font-bold">${statusText}</span>
                                </div>
                                <div class="grid grid-cols-3 gap-4 text-sm mb-3">
                                    <div><span class="text-gray-400">${t('score_label')}</span><span class="font-bold text-indigo-600">${p.lastScore || 0}${t('score_unit')}</span></div>
                                    <div><span class="text-gray-400">${t('answer_ratio')}</span><span class="font-bold">${p.correctCount}/${answeredCount}/${p.totalCount}</span></div>
                                    <div><span class="text-gray-400">${t('complete_time')}</span>${completeDate}</div>
                                </div>
                                ${p.questionDetails && p.questionDetails.length > 0 ? `
                                    <div class="mt-4 border-t pt-4">
                                        <h5 class="font-bold text-sm text-gray-600 mb-3">${t('question_detail')}</h5>
                                        <div class="space-y-3">
                                            ${p.questionDetails.map(q => {
                                                let bgClass = 'bg-gray-50 border-gray-200';
                                                let resultText = '';
                                                let resultClass = '';
                                                if (q.submitted) {
                                                    if (q.isCorrect) {
                                                        bgClass = 'bg-green-50 border-green-200';
                                                        resultText = '✓ 正确';
                                                        resultClass = 'text-green-600';
                                                    } else {
                                                        bgClass = 'bg-red-50 border-red-200';
                                                        resultText = '✗ 错误';
                                                        resultClass = 'text-red-600';
                                                    }
                                                } else {
                                                    resultText = '未作答';
                                                    resultClass = 'text-gray-500';
                                                }
                                                
                                                let typeLabel = '单选题';
                                                if (q.type === 'multiple') typeLabel = '多选题';
                                                else if (q.type === 'truefalse') typeLabel = '判断题';
                                                
                                                let optionsHtml = '';
                                                if (q.options && Object.keys(q.options).length > 0) {
                                                    optionsHtml = '<div class="space-y-1 mb-3">';
                                                    for (let key in q.options) {
                                                        const isSelected = q.userAnswer && q.userAnswer.includes(key);
                                                        const isCorrect = q.correctAnswer && q.correctAnswer.includes(key);
                                                        let optionClass = 'text-gray-700';
                                                        if (q.submitted) {
                                                            if (isSelected && isCorrect) {
                                                                optionClass = 'text-green-600 font-bold';
                                                            } else if (isSelected && !isCorrect) {
                                                                optionClass = 'text-red-600 font-bold';
                                                            } else if (!isSelected && isCorrect) {
                                                                optionClass = 'text-green-600';
                                                            }
                                                        }
                                                        optionsHtml += `<div class="${optionClass}">${key}. ${q.options[key]}</div>`;
                                                    }
                                                    optionsHtml += '</div>';
                                                }
                                                
                                                return `
                                                    <div class="border ${bgClass} rounded-lg p-4">
                                                        <div class="flex justify-between items-start mb-2">
                                                            <span class="font-bold text-gray-800">第${q.index}题 (${typeLabel})</span>
                                                            <span class="font-bold ${resultClass}">${resultText}</span>
                                                        </div>
                                                        <div class="mb-2">
                                                            <h6 class="font-bold text-gray-700 mb-1">${q.title || ''}</h6>
                                                            <p class="text-gray-600">${q.question || ''}</p>
                                                        </div>
                                                        ${optionsHtml}
                                                        ${q.submitted ? `
                                                            <div class="text-sm mt-3 pt-3 border-t border-gray-200">
                                                                <p class="text-gray-600">学生答案: <span class="font-medium">${q.userAnswer || '无'}</span></p>
                                                                <p class="text-gray-600">正确答案: <span class="font-medium text-green-600">${q.correctAnswer || '无'}</span></p>
                                                                ${q.solution ? `<p class="text-gray-500 mt-2"><span class="font-medium">解题过程：</span>${q.solution}</p>` : ''}
                                                            </div>
                                                        ` : ''}
                                                    </div>
                                                `;
                                            }).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    });
                    content.innerHTML = html;
                }
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } catch (error) {
                console.error('获取进度失败:', error);
                alert(t('get_progress_failed'));
            }
        }

        // 关闭进度弹窗
        function closeProgressModal() {
            const modal = document.getElementById('progressModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // 删除题单
        async function deleteQuestion(questionId, title) {
            if (!confirm(t('confirm_delete', {title: title}))) {
                return;
            }
            
            try {
                const response = await fetch(`/api/parent/questions/${questionId}`, {
                    method: 'DELETE',
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(t('delete_success'));
                    loadQuestions();
                } else {
                    alert(t('delete_failed') + data.message);
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert(t('delete_failed'));
            }
        }

        // 退出登录
        async function logout() {
            try {
                await fetch('/api/logout', { 
                    method: 'POST',
                    credentials: 'same-origin'
                });
                window.location.href = '/';
            } catch (error) {
                console.error('退出失败:', error);
            }
        }

        // 语言切换下拉菜单功能
        function toggleLangDropdown() {
            const switcher = document.getElementById('langSwitcher');
            switcher.classList.toggle('open');
        }

        function switchLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', currentLang);
            document.getElementById('langSwitcher').classList.remove('open');
            location.reload();
        }

        function updateLangDisplay() {
            const flag = document.getElementById('currentLangFlag');
            const text = document.getElementById('currentLangText');
            
            if (currentLang === 'zh-CN') {
                flag.textContent = '🇨🇳';
                text.textContent = '简体中文';
            } else {
                flag.textContent = '🇺🇸';
                text.textContent = 'English';
            }
            
            document.querySelectorAll('.lang-option').forEach(opt => {
                if (opt.dataset.lang === currentLang) {
                    opt.classList.add('active');
                } else {
                    opt.classList.remove('active');
                }
            });
        }

        document.addEventListener('click', function(e) {
            const switcher = document.getElementById('langSwitcher');
            if (switcher && !switcher.contains(e.target)) {
                switcher.classList.remove('open');
            }
        });

        // 拖拽上传
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('bg-indigo-50', 'border-indigo-300');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('bg-indigo-50', 'border-indigo-300');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('bg-indigo-50', 'border-indigo-300');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('fileInput').files = files;
                handleFileSelect({ target: { files: files } });
            }
        });

        // ========== AI出题功能 ==========
        
        // 状态变量
        let selectedSubject = null;
        let selectedGrade = null;
        let generatedMarkdown = null;
        
        // 打开AI出题弹窗
        function openAIGenerateModal() {
            const modal = document.getElementById('aiGenerateModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            resetAIGenerateForm();
        }
        
        // 关闭AI出题弹窗
        function closeAIGenerateModal() {
            const modal = document.getElementById('aiGenerateModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            resetAIGenerateForm();
        }
        
        // 重置表单
        function resetAIGenerateForm() {
            selectedSubject = null;
            selectedGrade = null;
            generatedMarkdown = null;
            
            document.getElementById('aiFormStep').classList.remove('hidden');
            document.getElementById('aiPreviewStep').classList.add('hidden');
            
            document.getElementById('aiScope').value = '';
            document.getElementById('singleChoiceCount').value = '0';
            document.getElementById('multipleChoiceCount').value = '0';
            document.getElementById('trueFalseCount').value = '0';
            
            document.querySelectorAll('.subject-btn').forEach(btn => {
                btn.classList.remove('border-blue-500', 'bg-blue-50');
                btn.classList.add('border-gray-300');
            });
            document.querySelectorAll('.grade-btn').forEach(btn => {
                btn.classList.remove('border-blue-500', 'bg-blue-50');
                btn.classList.add('border-gray-300');
            });
            
            hideStatus('aiFormStatus');
            hideStatus('aiPublishStatus');
        }
        
        // 选择学科
        function selectSubject(subject) {
            selectedSubject = subject;
            document.querySelectorAll('.subject-btn').forEach(btn => {
                if (btn.dataset.subject === subject) {
                    btn.classList.remove('border-gray-300');
                    btn.classList.add('border-blue-500', 'bg-blue-50');
                } else {
                    btn.classList.remove('border-blue-500', 'bg-blue-50');
                    btn.classList.add('border-gray-300');
                }
            });
        }
        
        // 选择年级
        function selectGrade(grade) {
            selectedGrade = grade;
            document.querySelectorAll('.grade-btn').forEach(btn => {
                if (btn.dataset.grade === grade) {
                    btn.classList.remove('border-gray-300');
                    btn.classList.add('border-blue-500', 'bg-blue-50');
                } else {
                    btn.classList.remove('border-blue-500', 'bg-blue-50');
                    btn.classList.add('border-gray-300');
                }
            });
        }
        
        // 显示状态
        function showAIStatus(elementId, message, type) {
            const statusDiv = document.getElementById(elementId);
            statusDiv.classList.remove('hidden');
            
            let bgClass = 'bg-gray-100 text-gray-700';
            if (type === 'success') bgClass = 'bg-green-100 text-green-700';
            if (type === 'error') bgClass = 'bg-red-100 text-red-700';
            if (type === 'loading') bgClass = 'bg-blue-100 text-blue-700';
            
            statusDiv.className = `p-4 rounded-lg ${bgClass}`;
            statusDiv.textContent = message;
        }
        
        // 隐藏状态
        function hideStatus(elementId) {
            document.getElementById(elementId).classList.add('hidden');
        }
        
        // 生成题目
        async function generateQuestions() {
            // 验证
            if (!selectedSubject) {
                showAIStatus('aiFormStatus', t('fill_all_fields_ai'), 'error');
                return;
            }
            if (!selectedGrade) {
                showAIStatus('aiFormStatus', t('fill_all_fields_ai'), 'error');
                return;
            }
            
            const scope = document.getElementById('aiScope').value.trim();
            const singleCount = parseInt(document.getElementById('singleChoiceCount').value) || 0;
            const multiCount = parseInt(document.getElementById('multipleChoiceCount').value) || 0;
            const tfCount = parseInt(document.getElementById('trueFalseCount').value) || 0;
            
            if (singleCount + multiCount + tfCount === 0) {
                showAIStatus('aiFormStatus', t('fill_all_fields_ai'), 'error');
                return;
            }
            
            // 显示加载
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = `<span data-i18n="generating">${t('generating')}</span>`;
            showAIStatus('aiFormStatus', t('generating'), 'loading');
            
            try {
                const response = await fetch('/api/parent/ai-generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        subject: selectedSubject,
                        grade: selectedGrade,
                        scope: scope,
                        singleChoiceCount: singleCount,
                        multipleChoiceCount: multiCount,
                        trueFalseCount: tfCount
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    generatedMarkdown = data.markdown;
                    showPreview(generatedMarkdown);
                } else {
                    showAIStatus('aiFormStatus', t('generate_failed') + data.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = `<span data-i18n="generate_btn">${t('generate_btn')}</span>`;
                }
            } catch (error) {
                console.error('生成失败:', error);
                showAIStatus('aiFormStatus', t('generate_failed'), 'error');
                btn.disabled = false;
                btn.innerHTML = `<span data-i18n="generate_btn">${t('generate_btn')}</span>`;
            }
        }
        
        // 简单的Markdown解析函数
        function parseMarkdown(markdown) {
            let html = markdown;
            
            // 处理标题
            html = html.replace(/^### (.*)$/gm, '<h4 class="text-lg font-bold text-gray-800 mt-4 mb-2">$1</h4>');
            html = html.replace(/^## (.*)$/gm, '<h3 class="text-xl font-bold text-gray-800 mt-6 mb-3 border-b pb-2">$1</h3>');
            html = html.replace(/^# (.*)$/gm, '<h2 class="text-2xl font-bold text-gray-800 mt-4 mb-4">$1</h2>');
            
            // 处理粗体
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-gray-800">$1</strong>');
            
            // 处理选项 (A. B. C. D.)
            html = html.replace(/^([A-D]\. .*)$/gm, '<div class="ml-4 my-2 text-gray-700"><span class="font-bold">$1</span></div>');
            
            // 处理段落
            html = html.split('\n').map(line => {
                if (!line.trim()) return '';
                if (line.startsWith('<')) return line;
                return `<p class="text-gray-700 my-2">${line}</p>`;
            }).join('\n');
            
            // 处理details标签，改为显示为展开的内容（家长可以看到答案）
            html = html.replace(/<details>/g, '');
            html = html.replace(/<summary>.*?<\/summary>/g, '');
            html = html.replace(/<\/details>/g, '');
            
            // 处理分割线
            html = html.replace(/^---$/gm, '<hr class="my-6 border-gray-200">');
            
            return html;
        }

        // 显示预览
        function showPreview(markdown) {
            document.getElementById('aiFormStep').classList.add('hidden');
            document.getElementById('aiPreviewStep').classList.remove('hidden');
            
            const previewContent = document.getElementById('previewContent');
            previewContent.innerHTML = `<div class="prose prose-sm max-w-none">${parseMarkdown(markdown)}</div>`;
        }
        
        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 返回表单
        function backToForm() {
            document.getElementById('aiFormStep').classList.remove('hidden');
            document.getElementById('aiPreviewStep').classList.add('hidden');
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = false;
            btn.innerHTML = `<span data-i18n="generate_btn">${t('generate_btn')}</span>`;
            hideStatus('aiFormStatus');
        }
        
        // 发布题单
        async function publishQuestions() {
            if (!generatedMarkdown) return;
            
            if (!confirm(t('confirm_publish'))) return;
            
            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            
            try {
                // 使用新的ai-publish接口
                const response = await fetch('/api/parent/ai-publish', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        subject: selectedSubject,
                        grade: selectedGrade,
                        scope: document.getElementById('aiScope').value.trim(),
                        markdown: generatedMarkdown
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAIStatus('aiPublishStatus', t('publish_success'), 'success');
                    loadQuestions();
                    setTimeout(() => {
                        closeAIGenerateModal();
                    }, 1500);
                } else {
                    showAIStatus('aiPublishStatus', t('publish_failed') + data.message, 'error');
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('发布失败:', error);
                showAIStatus('aiPublishStatus', t('publish_failed'), 'error');
                btn.disabled = false;
            }
        }
        
        // ========== 页面加载 ==========

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            updateLangDisplay();
            updatePageText();
            loadUserInfo();
            loadQuestions();
            loadCurrentPasswordQuestion();
        });
    </script>
</body>
