<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信息学竞赛练习系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <div class="text-5xl mb-4">📚</div>
            <h1 class="text-2xl font-bold text-gray-800">信息学竞赛练习系统</h1>
            <p class="text-gray-500 mt-2">请登录以继续</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                <input type="text" id="username" name="username" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    placeholder="请输入用户名">
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-medium text-gray-700">密码</label>
                    <button type="button" onclick="showPasswordHint()" 
                        class="text-sm text-indigo-600 hover:text-indigo-800 underline">
                        🔑 查看密码提示
                    </button>
                </div>
                <input type="password" id="password" name="password" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    placeholder="请输入密码（答案的汉语拼音）">
                <p class="text-xs text-gray-500 mt-1">提示：密码是答案的汉语拼音，不需要空格</p>
            </div>

            <div id="errorMessage" class="text-red-500 text-sm hidden"></div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition transform hover:scale-105 shadow-lg">
                登录
            </button>
        </form>


    </div>

    <!-- 密码提示弹窗 -->
    <div id="passwordHintModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md m-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">🔑 密码提示</h3>
                <button onclick="closePasswordHint()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <div id="passwordHintContent" class="text-gray-700">
                <p class="text-center py-4">加载中...</p>
            </div>
            <div class="mt-6 text-center">
                <button onclick="closePasswordHint()" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition">
                    知道了
                </button>
            </div>
        </div>
    </div>

    <script>
        // 显示密码提示
        async function showPasswordHint() {
            const modal = document.getElementById('passwordHintModal');
            const content = document.getElementById('passwordHintContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            try {
                const response = await fetch('/api/password-question');
                const data = await response.json();
                
                if (data.hasQuestion) {
                    content.innerHTML = `
                        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded">
                            <p class="font-bold text-gray-800 mb-2">请回答以下问题：</p>
                            <p class="text-lg text-indigo-700 font-medium">${data.question}</p>
                            <p class="text-sm text-gray-500 mt-3">💡 答案的汉语拼音就是你的登录密码</p>
                        </div>
                    `;
                } else {
                    content.innerHTML = `
                        <div class="bg-gray-50 p-4 rounded text-center">
                            <p class="text-gray-600">${data.question}</p>
                            <p class="text-sm text-gray-400 mt-2">请联系家长设置密码题</p>
                        </div>
                    `;
                }
            } catch (error) {
                content.innerHTML = `
                    <div class="bg-red-50 p-4 rounded text-center text-red-600">
                        加载失败，请重试
                    </div>
                `;
            }
        }
        
        // 关闭密码提示
        function closePasswordHint() {
            const modal = document.getElementById('passwordHintModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
        
        // 点击弹窗外部关闭
        document.getElementById('passwordHintModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePasswordHint();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            
            if (!username || !password) {
                errorDiv.textContent = '请输入用户名和密码';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 根据角色跳转到不同页面
                    if (data.role === 'student') {
                        window.location.href = '/student';
                    } else if (data.role === 'parent') {
                        window.location.href = '/parent';
                    }
                } else {
                    errorDiv.textContent = data.message || '登录失败';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = '网络错误，请重试';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
