<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle" data-i18n="exam_title">练习中 - 信息学竞赛练习系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- KaTeX for LaTeX math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script>
        // 测试 KaTeX 是否正确加载
        console.log('KaTeX 加载测试 - katex:', typeof window.katex !== 'undefined' ? '已加载' : '未加载');
        console.log('KaTeX 加载测试 - renderMathInElement:', typeof window.renderMathInElement !== 'undefined' ? '已加载' : '未加载');
    </script>
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .option-label { cursor: pointer; }
        .option-label:hover { background-color: #e0f2fe; }
        .option-input:checked + .option-label { background-color: #bfdbfe; border-color: #3b82f6; }
        .checkbox-input:checked + .option-label { background-color: #bfdbfe; border-color: #3b82f6; }
        .correct { background-color: #86efac !important; border-color: #22c55e !important; }
        .wrong { background-color: #fca5a5 !important; border-color: #ef4444 !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        code { background-color: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.9em; }
        pre { background-color: #1f2937; color: #e5e7eb; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
        pre code { background-color: transparent; padding: 0; color: inherit; }
        .question-text { line-height: 1.8; }
        .question-text pre { margin: 12px 0; }
        .tf-btn { transition: all 0.2s; }
        .tf-btn.selected-true { background-color: #86efac !important; border-color: #22c55e !important; }
        .tf-btn.selected-false { background-color: #fca5a5 !important; border-color: #ef4444 !important; }
        .type-badge-single { background-color: #dbeafe; color: #1d4ed8; }
        .type-badge-multiple { background-color: #fef3c7; color: #b45309; }
        .type-badge-truefalse { background-color: #fce7f3; color: #be185d; }
        
        /* 语言切换下拉菜单样式 */
        .lang-switcher { position: relative; display: inline-block; }
        .lang-switcher-btn-inner {
            background: #f3f4f6; border: 1px solid #e5e7eb; color: #374151;
            padding: 6px 12px; border-radius: 10px; cursor: pointer;
            font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px;
            transition: all 0.3s ease;
        }
        .lang-switcher-btn-inner:hover { background: #e5e7eb; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .lang-switcher.open .lang-switcher-btn-inner svg { transform: rotate(180deg); }
        .lang-dropdown {
            position: absolute; top: calc(100% + 8px); right: 0; background: white;
            border: 1px solid #e5e7eb; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); min-width: 160px; overflow: hidden;
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
        }
        .lang-switcher.open .lang-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
        .lang-option { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; transition: all 0.2s ease; color: #374151; font-size: 14px; }
        .lang-option:hover { background: #f3f4f6; }
        .lang-option.active { background: #eef2ff; color: #4f46e5; font-weight: 600; }
        .lang-option .flag { font-size: 18px; }
        .lang-option .check { margin-left: auto; opacity: 0; color: #4f46e5; font-weight: bold; }
        .lang-option.active .check { opacity: 1; }
        .lang-divider { height: 1px; background: #e5e7eb; margin: 4px 0; }
        
        /* 只读模式样式 */
        .readonly-mode .option-label,
        .readonly-mode .tf-btn {
            cursor: default;
            pointer-events: none;
        }
        .readonly-mode .option-label:hover {
            background-color: inherit;
        }
        .user-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; }
        .user-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; }
        
        /* 题目序号导航 */
        .question-index-nav {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
            gap: 6px;
            padding: 12px;
        }
        .question-index-item {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: none;
            background: none;
            padding: 0;
            font-family: inherit;
        }
        .question-index-item:hover {
            transform: scale(1.1);
        }
        .index-correct {
            background-color: #dcfce7;
            color: #16a34a;
            border: 1px solid #86efac;
        }
        .index-correct:hover {
            background-color: #bbf7d0;
        }
        .index-wrong {
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }
        .index-wrong:hover {
            background-color: #fecaca;
        }
        .index-unanswered {
            background-color: #f3f4f6;
            color: #6b7280;
            border: 1px solid #d1d5db;
        }
        .index-unanswered:hover {
            background-color: #e5e7eb;
        }
        
        /* Tooltip 样式 */
        .question-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 8px;
            padding: 6px 10px;
            background-color: #1f2937;
            color: #f3f4f6;
            font-size: 10px;
            line-height: 1.5;
            border-radius: 6px;
            max-width: 320px;
            min-width: 120px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
        }
        .question-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #1f2937;
        }
        .question-index-item:hover .question-tooltip {
            opacity: 1;
            visibility: visible;
        }
        .question-tooltip-content {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: normal;
            word-break: break-word;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <button onclick="goBack()" class="text-gray-600 hover:text-gray-800" data-i18n="back_btn">
                    ← 返回
                </button>
                <span class="text-xl font-bold text-gray-800" id="examTitle" data-i18n="exam_title">练习</span>
            </div>
            <div class="flex items-center gap-4" id="navRight">
                <!-- 语言切换 -->
                <div class="lang-switcher" id="langSwitcher">
                    <button class="lang-switcher-btn-inner" onclick="toggleLangDropdown()">
                        <span id="currentLangFlag">🇨🇳</span>
                        <span id="currentLangText">简体中文</span>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:14px;height:14px;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div class="lang-dropdown">
                        <div class="lang-option active" data-lang="zh-CN" onclick="switchLang('zh-CN')">
                            <span class="flag">🇨🇳</span>
                            <span>简体中文</span>
                            <span class="check">✓</span>
                        </div>
                        <div class="lang-divider"></div>
                        <div class="lang-option" data-lang="en" onclick="switchLang('en')">
                            <span class="flag">🇺🇸</span>
                            <span>English</span>
                            <span class="check">✓</span>
                        </div>
                    </div>
                </div>
                <!-- 动态内容 -->
            </div>
        </div>
    </nav>

    <!-- 主内容区 - 练习模式 -->
    <div id="examMode" class="max-w-4xl mx-auto px-4 py-6">
        <!-- 进度条 -->
        <div id="progressSection" class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progressBar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="flex justify-between mt-2 text-xs text-gray-500">
                <span><span data-i18n="answered_label">已完成</span>: <span id="answeredCount" class="font-bold text-green-600">0</span></span>
                <span><span data-i18n="current_score">当前得分</span>: <span id="currentScore" class="font-bold text-indigo-600">0</span></span>
            </div>
        </div>

        <!-- 题目卡片 -->
        <div id="questionCard" class="bg-white rounded-2xl shadow-xl p-6 md:p-8 fade-in">
            <div class="mb-4">
                <span id="questionId" class="inline-block bg-indigo-100 text-indigo-800 text-sm font-bold px-3 py-1 rounded-full mb-2"></span>
                <span id="typeBadge" class="inline-block text-sm font-bold px-3 py-1 rounded-full mb-2 ml-2"></span>
                <h3 id="questionTitle" class="text-lg font-bold text-gray-800"></h3>
            </div>

            <div id="questionContent" class="text-gray-700 mb-6 text-lg question-text"></div>

            <div id="optionsContainer" class="space-y-3 mb-6"></div>

            <div id="actionButtons" class="flex gap-4">
                <button onclick="submitAnswer()" id="submitBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-md" data-i18n="submit_answer">
                    ✅ 提交答案
                </button>
                <button onclick="skipQuestion()" id="skipBtn" class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-6 rounded-xl transition shadow-md" data-i18n="skip_question">

                </button>

            <div id="answerSection" class="hidden mt-6 pt-6 border-t-2 border-gray-100">
                <div id="resultBadge" class="text-center mb-4"></div>
                
                <div class="bg-gray-50 rounded-xl p-4 mb-4">
                    <h4 class="font-bold text-gray-800 mb-2" data-i18n="correct_answer_label">📋 正确答案</h4>
                    <p id="correctAnswer" class="text-lg font-bold text-green-600"></p>
                </div>

                <div class="bg-blue-50 rounded-xl p-4 mb-4">
                    <h4 class="font-bold text-gray-800 mb-2" data-i18n="solution_label">💡 解题过程</h4>
                    <div id="solutionContent" class="text-gray-700 text-sm leading-relaxed question-text"></div>
                </div>

                <div class="bg-purple-50 rounded-xl p-4 mb-4">
                    <h4 class="font-bold text-gray-800 mb-2" data-i18n="key_points_label">🎯 本题考点</h4>
                    <p id="pointContent" class="text-gray-700 text-sm"></p>
                </div>

                <div class="bg-orange-50 rounded-xl p-4">
                    <h4 class="font-bold text-gray-800 mb-2" data-i18n="review_label">📚 复习要点</h4>
                    <div id="reviewContent" class="text-gray-700 text-sm leading-relaxed question-text"></div>
                </div>

                <button onclick="nextQuestion()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-md" data-i18n="next_question">
                    下一题 →
                </button>
            </div>
        </div>

        <!-- 题目导航 -->
        <div id="navSection" class="bg-white rounded-xl shadow-md p-4 mt-6">
            <h4 class="font-bold text-gray-800 mb-3" data-i18n="question_nav">题目导航</h4>
            <div id="questionNav" class="flex flex-wrap gap-2">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 主内容区 - 只读模式（显示所有题目） -->
    <div id="readonlyMode" class="hidden max-w-4xl mx-auto px-4 py-6">
        <!-- 统计概览 -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="grid grid-cols-4 gap-4 text-center">
                <div>
                    <div class="text-2xl font-bold text-gray-800" id="statTotal">0</div>
                    <div class="text-xs text-gray-500" data-i18n="stat_total_questions">总题数</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-green-600" id="statCorrect">0</div>
                    <div class="text-xs text-gray-500" data-i18n="stat_correct">答对</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-red-600" id="statWrong">0</div>
                    <div class="text-xs text-gray-500" data-i18n="stat_wrong">答错</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-indigo-600" id="statScore">0</div>
                    <div class="text-xs text-gray-500" data-i18n="stat_score">得分</div>
                </div>
            </div>
        </div>
        
        <!-- 题目序号导航 -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <h4 class="font-bold text-gray-800 mb-2 text-sm" data-i18n="question_index_nav">题目导航（点击跳转，悬停预览）</h4>
            <div id="questionIndexNav" class="question-index-nav">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 所有题目列表 -->
        <div id="allQuestionsList" class="space-y-6">
            <!-- 动态生成 -->
        </div>
        
        <!-- 底部按钮 -->
        <div class="flex justify-center gap-4 mt-8 mb-8">
            <button onclick="goBack()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-8 rounded-xl transition shadow-md" data-i18n="back_to_list">
                返回题单
            </button>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script>
        const questionId = '{{ question_id }}';
        let questions = [];
        let currentIndex = 0;
        let answers = {};
        let isSubmitted = false;
        let isReadonly = false;

        // 常量定义
        const TOOLTIP_MAX_LENGTH = 150;
        const TOTAL_SCORE = 100; // 满分100分

        // 获取指定题目的分值（整数分配方案，确保总分100）
        function getQuestionPoints(questionIndex, totalQuestions) {
            if (totalQuestions === 0) return 0;
            const base = Math.floor(TOTAL_SCORE / totalQuestions);
            const remainder = TOTAL_SCORE % totalQuestions;
            // 前 remainder 道题多1分
            return questionIndex < remainder ? base + 1 : base;
        }

        // 计算得分（整数分配方案，总分100）
        function calculateScore(correctIndices, totalQuestions) {
            if (totalQuestions === 0) return 0;
            let score = 0;
            for (const idx of correctIndices) {
                score += getQuestionPoints(idx, totalQuestions);
            }
            return score;
        }

        // 检测是否为只读模式
        function checkReadonlyMode() {
            const urlParams = new URLSearchParams(window.location.search);
            isReadonly = urlParams.get('readonly') === 'true';
            
            if (isReadonly) {
                document.body.classList.add('readonly-mode');
                document.getElementById('pageTitle').textContent = '答题详情 - 信息学竞赛练习系统';
                document.getElementById('examMode').classList.add('hidden');
                document.getElementById('readonlyMode').classList.remove('hidden');
                document.getElementById('navRight').innerHTML = '<span class="text-sm text-gray-600">只读模式</span>';
            } else {
                document.getElementById('navRight').innerHTML = `
                    <span class="text-sm text-gray-600">
                        <span id="currentNum">1</span> / <span id="totalNum">0</span>
                    </span>
                    <button onclick="submitAll()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold">
                        提交全部
                    </button>
                `;
            }
        }

        // 加载题目
        async function loadExam() {
            try {
                const response = await fetch(`/api/questions/${questionId}`, { credentials: 'same-origin' });
                const data = await response.json();
                
                if (!data.success) {
                    alert('加载题目失败');
                    goBack();
                    return;
                }
                
                questions = data.data.questions;
                document.getElementById('examTitle').textContent = data.data.title || '练习';
                
                // 恢复之前的答案
                if (data.data.progress && data.data.progress.answers) {
                    answers = data.data.progress.answers;
                }
                
                if (isReadonly) {
                    renderAllQuestions();
                    updateReadonlyStats();
                    renderQuestionIndexNav();
                    // 渲染 LaTeX 数学公式（只读模式）
                    setTimeout(renderAllMath, 150);
                } else {
                    document.getElementById('totalNum').textContent = questions.length;
                    renderQuestionNav();
                    loadQuestion(0);
                }
            } catch (error) {
                console.error('加载失败:', error);
                alert('加载题目失败');
            }
        }

        // 只读模式：渲染所有题目
        function renderAllQuestions() {
            const container = document.getElementById('allQuestionsList');
            container.innerHTML = questions.map((q, index) => {
                const userAnswer = (answers && answers[index]) || {};
                const hasAnswered = userAnswer.selected !== undefined;
                const isCorrect = userAnswer.correct;
                
                let typeBadgeClass = 'type-badge-single';
                let typeText = '单选题';
                const qType = q.type || 'single';
                if (qType === 'multiple') {
                    typeBadgeClass = 'type-badge-multiple';
                    typeText = '多选题';
                } else if (qType === 'truefalse') {
                    typeBadgeClass = 'type-badge-truefalse';
                    typeText = '判断题';
                }
                
                let statusBadge = '';
                if (!hasAnswered) {
                    statusBadge = '<span class="inline-block bg-gray-100 text-gray-600 text-sm font-bold px-3 py-1 rounded-full">未作答</span>';
                } else if (isCorrect) {
                    statusBadge = '<span class="inline-block bg-green-100 text-green-600 text-sm font-bold px-3 py-1 rounded-full">✓ 正确</span>';
                } else {
                    statusBadge = '<span class="inline-block bg-red-100 text-red-600 text-sm font-bold px-3 py-1 rounded-full">✗ 错误</span>';
                }
                
                let optionsHtml = '';
                if (qType === 'truefalse') {
                    optionsHtml = renderReadonlyTrueFalse(q, userAnswer.selected);
                } else if (qType === 'multiple') {
                    optionsHtml = renderReadonlyMultipleChoice(q, userAnswer.selected);
                } else {
                    optionsHtml = renderReadonlySingleChoice(q, userAnswer.selected);
                }
                
                return `
                    <div id="question-${index}" class="bg-white rounded-2xl shadow-xl p-6 md:p-8 fade-in scroll-mt-6" style="animation-delay: ${index * 0.05}s;">
                        <div class="mb-4">
                            <span class="inline-block bg-indigo-100 text-indigo-800 text-sm font-bold px-3 py-1 rounded-full">第 ${index + 1} 题</span>
                            <span class="inline-block ${typeBadgeClass} text-sm font-bold px-3 py-1 rounded-full ml-2">${typeText}</span>
                            ${statusBadge}
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2">${q.title || ''}</h3>
                        <div class="text-gray-700 mb-6 text-lg question-text">${formatContent(q.question)}</div>
                        
                        <div class="space-y-3 mb-6">
                            ${optionsHtml}
                        </div>
                        
                        <div class="bg-gray-50 rounded-xl p-4 mb-4">
                            <h4 class="font-bold text-gray-800 mb-2">你的答案</h4>
                            <p class="text-lg font-bold ${isCorrect ? 'text-green-600' : 'text-red-600'}">
                                ${hasAnswered ? formatAnswer(userAnswer.selected, qType) : '未作答'}
                            </p>
                        </div>
                        
                        <div class="bg-green-50 rounded-xl p-4 mb-4">
                            <h4 class="font-bold text-gray-800 mb-2">正确答案</h4>
                            <p class="text-lg font-bold text-green-600">${formatAnswer(q.answer, qType)}</p>
                        </div>
                        
                        <div class="bg-blue-50 rounded-xl p-4 mb-4">
                            <h4 class="font-bold text-gray-800 mb-2">💡 解题过程</h4>
                            <div class="text-gray-700 text-sm leading-relaxed question-text">${formatContent(q.solution || '暂无解析')}</div>
                        </div>
                        
                        <div class="bg-purple-50 rounded-xl p-4 mb-4">
                            <h4 class="font-bold text-gray-800 mb-2">🎯 本题考点</h4>
                            <p class="text-gray-700 text-sm">${q.point || '暂无'}</p>
                        </div>
                        
                        <div class="bg-orange-50 rounded-xl p-4">
                            <h4 class="font-bold text-gray-800 mb-2">📚 复习要点</h4>
                            <div class="text-gray-700 text-sm leading-relaxed question-text">${formatContent(q.review || '暂无')}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderReadonlySingleChoice(q, userAnswer) {
            return ['A', 'B', 'C', 'D'].map(label => {
                if (!q.options[label]) return '';
                const isSelected = userAnswer === label;
                const isCorrect = q.answer === label;
                let bgClass = 'bg-gray-50 border-gray-200';
                if (isCorrect) bgClass = 'correct';
                else if (isSelected && !isCorrect) bgClass = 'wrong';
                
                return `
                    <div class="p-4 border-2 rounded-xl ${bgClass}">
                        <span class="inline-block w-8 h-8 bg-white text-gray-700 rounded-full text-center leading-8 mr-3 font-bold">${label}</span>
                        <span>${formatContent(q.options[label])}</span>
                        ${isCorrect ? '<span class="ml-2 text-green-600 font-bold">✓ 正确答案</span>' : ''}
                        ${isSelected && !isCorrect ? '<span class="ml-2 text-red-600 font-bold">✗ 你的选择</span>' : ''}
                    </div>
                `;
            }).join('');
        }

        function renderReadonlyMultipleChoice(q, userAnswer) {
            const userAnswers = userAnswer ? userAnswer.split('') : [];
            const correctAnswers = q.answer ? q.answer.split('') : [];
            
            return ['A', 'B', 'C', 'D'].map(label => {
                if (!q.options[label]) return '';
                const isSelected = userAnswers.includes(label);
                const isCorrect = correctAnswers.includes(label);
                let bgClass = 'bg-gray-50 border-gray-200';
                if (isCorrect) bgClass = 'correct';
                else if (isSelected && !isCorrect) bgClass = 'wrong';
                
                return `
                    <div class="p-4 border-2 rounded-xl ${bgClass}">
                        <span class="inline-block w-8 h-8 bg-white text-gray-700 rounded-full text-center leading-8 mr-3 font-bold">${label}</span>
                        <span>${formatContent(q.options[label])}</span>
                        ${isCorrect ? '<span class="ml-2 text-green-600 font-bold">✓ 正确答案</span>' : ''}
                        ${isSelected && !isCorrect ? '<span class="ml-2 text-red-600 font-bold">✗ 你的选择</span>' : ''}
                    </div>
                `;
            }).join('');
        }

        function renderReadonlyTrueFalse(q, userAnswer) {
            const correctAnswer = String(q.answer).toUpperCase();
            const userAns = String(userAnswer).toUpperCase();
            const trueValues = ['T', 'TRUE', '正确', '对', '√'];
            const falseValues = ['F', 'FALSE', '错误', '错', '×'];
            
            const userIsTrue = trueValues.includes(userAns);
            const userIsFalse = falseValues.includes(userAns);
            const correctIsTrue = trueValues.includes(correctAnswer);
            const correctIsFalse = falseValues.includes(correctAnswer);
            
            const trueClass = correctIsTrue ? 'correct' : (userIsTrue ? 'wrong' : 'bg-gray-50 border-gray-200');
            const falseClass = correctIsFalse ? 'correct' : (userIsFalse ? 'wrong' : 'bg-gray-50 border-gray-200');
            
            return `
                <div class="p-4 border-2 rounded-xl ${trueClass}">
                    <span class="font-bold mr-2">正确</span>
                    ${correctIsTrue ? '<span class="text-green-600 font-bold">✓ 正确答案</span>' : ''}
                    ${userIsTrue ? '<span class="text-red-600 font-bold">✗ 你的选择</span>' : ''}
                </div>
                <div class="p-4 border-2 rounded-xl ${falseClass}">
                    <span class="font-bold mr-2">错误</span>
                    ${correctIsFalse ? '<span class="text-green-600 font-bold">✓ 正确答案</span>' : ''}
                    ${userIsFalse ? '<span class="text-red-600 font-bold">✗ 你的选择</span>' : ''}
                </div>
            `;
        }

        function updateReadonlyStats() {
            const total = questions.length;
            const correctIndices = [];
            Object.entries(answers).forEach(([idx, ans]) => {
                if (ans.correct) correctIndices.push(parseInt(idx));
            });
            const correct = correctIndices.length;
            const answered = Object.keys(answers).length;
            const wrong = answered - correct;
            const score = calculateScore(correctIndices, total);

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statCorrect').textContent = correct;
            document.getElementById('statWrong').textContent = wrong;
            document.getElementById('statScore').textContent = score;
        }

        // 渲染题目序号导航
        function renderQuestionIndexNav() {
            const container = document.getElementById('questionIndexNav');
            container.innerHTML = questions.map((q, index) => {
                const userAnswer = (answers && answers[index]) || {};
                const hasAnswered = userAnswer.selected !== undefined;
                const isCorrect = userAnswer.correct;

                let statusClass = 'index-unanswered';
                if (hasAnswered) {
                    statusClass = isCorrect ? 'index-correct' : 'index-wrong';
                }
                
                // 获取题目预览文本（去掉 HTML 标签）
                const questionPreview = (q.title || q.question || '').replace(/<[^>]*>/g, '').substring(0, TOOLTIP_MAX_LENGTH);

                return `
                    <button type="button" class="question-index-item ${statusClass}" onclick="scrollToQuestion(${index})" aria-label="跳转到第 ${index + 1} 题">
                        ${index + 1}
                        <div class="question-tooltip">
                            <div class="question-tooltip-content">${questionPreview || '第 ' + (index + 1) + ' 题'}</div>
                        </div>
                    </button>
                `;
            }).join('');
        }

        // 跳转到指定题目
        function scrollToQuestion(index) {
            if (index < 0 || index >= questions.length) {
                console.warn(`无效的题目索引: ${index}`);
                return;
            }
            const element = document.getElementById(`question-${index}`);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                // 高亮效果
                element.style.boxShadow = '0 0 0 3px rgba(99, 102, 241, 0.5)';
                setTimeout(() => {
                    element.style.boxShadow = '';
                }, 1500);
            } else {
                console.warn(`未找到题目元素: question-${index}`);
            }
        }

        // 加载单个题目（练习模式）
        function loadQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentIndex = index;
            isSubmitted = false;
            
            const q = questions[index];
            
            document.getElementById('currentNum').textContent = index + 1;
            const progress = (Object.keys(answers).length / questions.length * 100).toFixed(1);
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('answeredCount').textContent = Object.keys(answers).length;
            
            document.getElementById('questionId').textContent = '考点 ' + q.id;
            document.getElementById('questionTitle').textContent = q.title;
            document.getElementById('questionContent').innerHTML = formatContent(q.question);
            
            // 显示题型标签
            const typeBadge = document.getElementById('typeBadge');
            const qType = q.type || 'single';
            if (qType === 'multiple') {
                typeBadge.textContent = '多选题';
                typeBadge.className = 'inline-block text-sm font-bold px-3 py-1 rounded-full mb-2 ml-2 type-badge-multiple';
            } else if (qType === 'truefalse') {
                typeBadge.textContent = '判断题';
                typeBadge.className = 'inline-block text-sm font-bold px-3 py-1 rounded-full mb-2 ml-2 type-badge-truefalse';
            } else {
                typeBadge.textContent = '单选题';
                typeBadge.className = 'inline-block text-sm font-bold px-3 py-1 rounded-full mb-2 ml-2 type-badge-single';
            }
            
            // 生成选项
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            if (qType === 'truefalse') {
                renderTrueFalseOptions(container, q, index);
            } else if (qType === 'multiple') {
                renderMultipleChoiceOptions(container, q, index);
            } else {
                renderSingleChoiceOptions(container, q, index);
            }
            
            // 恢复之前的选择
            if (answers[index]) {
                restoreAnswer(index, q, qType);
            } else {
                hideAnswer();
            }
            
            updateNavHighlight();
            
            // 渲染 LaTeX 数学公式
            setTimeout(renderAllMath, 50);
        }

        function renderSingleChoiceOptions(container, q, index) {
            ['A', 'B', 'C', 'D'].forEach(label => {
                if (q.options[label]) {
                    const div = document.createElement('div');
                    div.className = 'relative';
                    div.innerHTML = `
                        <input type="radio" name="answer" id="opt${label}" value="${label}" class="option-input hidden" onchange="selectOption('${label}')">
                        <label for="opt${label}" id="label${label}" class="option-label block w-full p-4 border-2 border-gray-200 rounded-xl transition font-medium">
                            <span class="inline-block w-8 h-8 bg-gray-100 text-gray-700 rounded-full text-center leading-8 mr-3 font-bold">${label}</span>
                            <span>${formatContent(q.options[label])}</span>
                        </label>
                    `;
                    container.appendChild(div);
                }
            });
        }

        function renderMultipleChoiceOptions(container, q, index) {
            ['A', 'B', 'C', 'D'].forEach(label => {
                if (q.options[label]) {
                    const div = document.createElement('div');
                    div.className = 'relative';
                    div.innerHTML = `
                        <input type="checkbox" name="answer" id="opt${label}" value="${label}" class="checkbox-input hidden" onchange="onMultiSelect()">
                        <label for="opt${label}" id="label${label}" class="option-label block w-full p-4 border-2 border-gray-200 rounded-xl transition font-medium">
                            <span class="inline-block w-8 h-8 bg-gray-100 text-gray-700 rounded-full text-center leading-8 mr-3 font-bold">${label}</span>
                            <span>${formatContent(q.options[label])}</span>
                        </label>
                    `;
                    container.appendChild(div);
                }
            });
        }

        function renderTrueFalseOptions(container, q, index) {
            container.innerHTML = `
                <div class="flex gap-4">
                    <button onclick="selectTrueFalse('T')" id="tfBtnT" 
                        class="tf-btn flex-1 p-6 border-2 border-gray-200 rounded-xl text-center cursor-pointer transition font-bold text-lg hover:bg-green-50">
                        ✅ 正确
                    </button>
                    <button onclick="selectTrueFalse('F')" id="tfBtnF" 
                        class="tf-btn flex-1 p-6 border-2 border-gray-200 rounded-xl text-center cursor-pointer transition font-bold text-lg hover:bg-red-50">
                        ❌ 错误
                    </button>
                </div>
            `;
        }

        function selectTrueFalse(value) {
            document.getElementById('tfBtnT').classList.remove('selected-true');
            document.getElementById('tfBtnF').classList.remove('selected-false');
            if (value === 'T') {
                document.getElementById('tfBtnT').classList.add('selected-true');
            } else {
                document.getElementById('tfBtnF').classList.add('selected-false');
            }
            window._tfSelected = value;
        }

        function onMultiSelect() {
            document.querySelectorAll('input[name="answer"]:checked').forEach(cb => {
                document.getElementById('label' + cb.value).classList.add('ring-2', 'ring-indigo-500');
            });
            document.querySelectorAll('input[name="answer"]:not(:checked)').forEach(cb => {
                document.getElementById('label' + cb.value).classList.remove('ring-2', 'ring-indigo-500');
            });
        }

        function getMultiSelectAnswer() {
            const checked = document.querySelectorAll('input[name="answer"]:checked');
            const letters = [];
            checked.forEach(cb => letters.push(cb.value));
            return letters.sort().join('');
        }

        function restoreAnswer(index, q, qType) {
            const ans = answers[index];
            if (qType === 'truefalse') {
                if (ans.selected) {
                    selectTrueFalse(ans.selected);
                }
            } else if (qType === 'multiple') {
                if (ans.selected) {
                    const selectedLetters = ans.selected.split('');
                    selectedLetters.forEach(letter => {
                        const cb = document.getElementById('opt' + letter);
                        if (cb) {
                            cb.checked = true;
                            document.getElementById('label' + letter).classList.add('ring-2', 'ring-indigo-500');
                        }
                    });
                }
            } else {
                if (ans.selected) {
                    const radio = document.getElementById('opt' + ans.selected);
                    if (radio) {
                        radio.checked = true;
                        document.getElementById('label' + ans.selected).classList.add('ring-2', 'ring-indigo-500');
                    }
                }
            }
            
            if (ans.submitted) {
                showAnswerResult(ans.correct, q);
                highlightCorrectAnswer(q);
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;');
        }

        function formatContent(text) {
            if (!text) return '';
            
            // 1. 提取并保护 LaTeX 公式（防止被格式化处理破坏）
            const latexFormulas = {};
            let counter = 0;
            
            // 保护 $$...$$（块级公式）
            text = text.replace(/\$\$[\s\S]*?\$\$/g, function(match) {
                const placeholder = `__LATEX_${counter}__`;
                latexFormulas[placeholder] = match;
                counter++;
                return placeholder;
            });
            
            // 保护 $...$（行内公式）
            text = text.replace(/\$[^$]+?\$/g, function(match) {
                const placeholder = `__LATEX_${counter}__`;
                latexFormulas[placeholder] = match;
                counter++;
                return placeholder;
            });
            
            // 2. 处理格式（代码块、换行、加粗等）
            text = text.replace(/```cpp\n([\s\S]*?)```/g, function(match, code) {
                return '<pre><code>' + escapeHtml(code) + '</code></pre>';
            });
            text = text.replace(/```\n([\s\S]*?)```/g, function(match, code) {
                return '<pre><code>' + escapeHtml(code) + '</code></pre>';
            });
            text = text.replace(/`([^`]+)`/g, function(match, code) {
                return '<code>' + escapeHtml(code) + '</code>';
            });
            text = text.replace(/\n/g, '<br>');
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // 3. 恢复 LaTeX 公式
            for (const [placeholder, formula] of Object.entries(latexFormulas)) {
                text = text.replace(placeholder, formula);
            }
            
            return text;
        }

        // 我们的渲染函数，避免与 KaTeX 的 renderMathInElement 冲突
        function renderLaTeX(element) {
            console.log('renderLaTeX 被调用, element:', element);
            if (!element) {
                console.error('renderLaTeX: element 为空');
                return;
            }
            
            console.log('window.renderMathInElement:', typeof window.renderMathInElement);
            console.log('window.katex:', typeof window.katex);
            
            // 等待 KaTeX 加载完成
            if (typeof window.renderMathInElement !== 'function') {
                console.warn('KaTeX 尚未加载，等待100ms后重试...');
                setTimeout(() => renderLaTeX(element), 100);
                return;
            }
            
            try {
                console.log('开始 KaTeX 渲染...');
                // 调用 KaTeX 的 renderMathInElement
                window.renderMathInElement(element, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
                console.log('KaTeX 渲染完成');
            } catch (e) {
                console.error('KaTeX 渲染失败:', e);
            }
        }

        // 渲染页面中所有数学公式
        function renderAllMath() {
            const elements = [
                document.getElementById('questionContent'),
                document.getElementById('optionsContainer'),
                document.getElementById('solutionContent'),
                document.getElementById('reviewContent'),
                document.getElementById('allQuestionsList')
            ];
            
            elements.forEach(el => {
                if (el) {
                    renderLaTeX(el);
                }
            });
        }

        function formatAnswer(answer, type) {
            if (!answer) return '未作答';
            if (type === 'truefalse') {
                const ans = String(answer).toUpperCase();
                const trueValues = ['T', 'TRUE', '正确', '对', '√'];
                if (trueValues.includes(ans)) return '正确';
                return '错误';
            }
            return answer;
        }

        function selectOption(label) {
            document.querySelectorAll('.option-label').forEach(el => {
                el.classList.remove('ring-2', 'ring-indigo-500');
            });
            document.getElementById('label' + label).classList.add('ring-2', 'ring-indigo-500');
        }

        function submitAnswer() {
            const q = questions[currentIndex];
            const qType = q.type || 'single';
            
            let userAnswer;
            if (qType === 'truefalse') {
                userAnswer = window._tfSelected;
                if (!userAnswer) {
                    alert('请先选择正确或错误！');
                    return;
                }
            } else if (qType === 'multiple') {
                userAnswer = getMultiSelectAnswer();
                if (!userAnswer) {
                    alert('请至少选择一个选项！');
                    return;
                }
            } else {
                const selected = document.querySelector('input[name="answer"]:checked');
                if (!selected) {
                    alert('请先选择一个答案！');
                    return;
                }
                userAnswer = selected.value;
            }
            
            const correct = isAnswerCorrect(userAnswer, q);
            
            answers[currentIndex] = {
                selected: userAnswer,
                correct: correct,
                submitted: true
            };
            
            showAnswerResult(correct, q);
            highlightCorrectAnswer(q);
            updateStats();
            renderQuestionNav();
            autosaveProgress();
        }

        function isAnswerCorrect(userAnswer, q) {
            const correctAnswer = q.answer || '';
            const qType = q.type || 'single';
            
            if (!userAnswer || !correctAnswer) return false;
            
            if (qType === 'truefalse') {
                return normalizeTF(userAnswer) === normalizeTF(correctAnswer);
            }
            if (qType === 'multiple') {
                const userSet = new Set(userAnswer.toUpperCase().split(''));
                const correctSet = new Set(correctAnswer.toUpperCase().split(''));
                return userSet.size === correctSet.size && [...userSet].every(x => correctSet.has(x));
            }
            return userAnswer.toUpperCase() === correctAnswer.toUpperCase();
        }

        function normalizeTF(val) {
            const v = String(val).trim().toUpperCase();
            if (['正确', '对', '√', 'T', 'TRUE'].includes(v)) return 'T';
            if (['错误', '错', '×', 'F', 'FALSE'].includes(v)) return 'F';
            return v;
        }

        function showAnswerResult(correct, q) {
            document.getElementById('answerSection').classList.remove('hidden');
            document.getElementById('actionButtons').classList.add('hidden');
            
            const badge = document.getElementById('resultBadge');
            if (correct) {
                badge.innerHTML = '<span class="inline-block bg-green-100 text-green-800 text-xl font-bold px-6 py-2 rounded-full">🎉 回答正确！</span>';
            } else {
                badge.innerHTML = '<span class="inline-block bg-red-100 text-red-800 text-xl font-bold px-6 py-2 rounded-full">😔 回答错误</span>';
            }
            
            const qType = q.type || 'single';
            let answerDisplay = q.answer;
            if (qType === 'truefalse') {
                const tf = normalizeTF(q.answer);
                answerDisplay = (tf === 'T') ? '正确' : '错误';
            }
            document.getElementById('correctAnswer').textContent = answerDisplay;
            document.getElementById('solutionContent').innerHTML = formatContent(q.solution);
            document.getElementById('pointContent').textContent = q.point;
            document.getElementById('reviewContent').innerHTML = formatContent(q.review);
            
            // 渲染 LaTeX 数学公式（答案解析区域）
            setTimeout(renderAllMath, 50);
        }

        function highlightCorrectAnswer(q) {
            const qType = q.type || 'single';
            const correctAnswer = String(q.answer).toUpperCase();
            
            if (qType === 'truefalse') {
                const tf = normalizeTF(q.answer);
                if (tf === 'T') {
                    document.getElementById('tfBtnT').classList.add('correct');
                } else {
                    document.getElementById('tfBtnF').classList.add('correct');
                }
            } else {
                ['A', 'B', 'C', 'D'].forEach(label => {
                    if (correctAnswer.includes(label)) {
                        const labelEl = document.getElementById('label' + label);
                        if (labelEl) labelEl.classList.add('correct');
                    }
                });
            }
        }

        function hideAnswer() {
            document.getElementById('answerSection').classList.add('hidden');
            document.getElementById('actionButtons').classList.remove('hidden');
        }

        function skipQuestion() {
            nextQuestion();
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                loadQuestion(currentIndex + 1);
            } else {
                alert('已经是最后一题了！');
            }
        }

        function updateStats() {
            const correctIndices = [];
            Object.entries(answers).forEach(([idx, ans]) => {
                if (ans.correct) correctIndices.push(parseInt(idx));
            });
            const score = calculateScore(correctIndices, questions.length);
            document.getElementById('currentScore').textContent = score;
        }

        async function autosaveProgress() {
            try {
                await fetch(`/api/questions/${questionId}/autosave`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answers }),
                    credentials: 'same-origin'
                });
            } catch (error) {
                console.error('自动保存失败:', error);
            }
        }

        function renderQuestionNav() {
            const nav = document.getElementById('questionNav');
            nav.innerHTML = questions.map((q, idx) => {
                let bgClass = 'bg-gray-200 text-gray-600';
                if (answers[idx]) {
                    if (answers[idx].submitted) {
                        bgClass = answers[idx].correct ? 'bg-green-500 text-white' : 'bg-red-500 text-white';
                    }
                }
                return `
                    <button onclick="loadQuestion(${idx})" 
                        class="w-10 h-10 rounded-lg ${bgClass} font-bold text-sm hover:opacity-80 transition"
                        id="nav-${idx}">
                        ${idx + 1}
                    </button>
                `;
            }).join('');
        }

        function updateNavHighlight() {
            document.querySelectorAll('#questionNav button').forEach((btn, idx) => {
                if (idx === currentIndex) {
                    btn.classList.add('ring-2', 'ring-indigo-500');
                } else {
                    btn.classList.remove('ring-2', 'ring-indigo-500');
                }
            });
        }

        async function submitAll() {
            if (Object.keys(answers).length === 0) {
                alert('还没有作答任何题目！');
                return;
            }
            
            if (!confirm('确定要提交全部答案吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/questions/${questionId}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answers }),
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`提交成功！\n得分：${data.score}分\n答对：${data.correctCount}/${data.totalCount}题`);
                    window.location.href = '/student';
                } else {
                    alert('提交失败：' + data.message);
                }
            } catch (error) {
                console.error('提交失败:', error);
                alert('提交失败，请重试');
            }
        }

        function goBack() {
            if (!isReadonly && Object.keys(answers).length > 0) {
                autosaveProgress().then(() => {
                    window.location.href = '/student';
                });
            } else {
                window.location.href = '/student';
            }
        }

        // 语言切换下拉菜单功能
        function toggleLangDropdown() {
            const switcher = document.getElementById('langSwitcher');
            switcher.classList.toggle('open');
        }

        function switchLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', currentLang);
            document.getElementById('langSwitcher').classList.remove('open');
            location.reload();
        }

        function updateLangDisplay() {
            const flag = document.getElementById('currentLangFlag');
            const text = document.getElementById('currentLangText');
            
            if (currentLang === 'zh-CN') {
                flag.textContent = '🇨🇳';
                text.textContent = '简体中文';
            } else {
                flag.textContent = '🇺🇸';
                text.textContent = 'English';
            }
            
            document.querySelectorAll('.lang-option').forEach(opt => {
                if (opt.dataset.lang === currentLang) {
                    opt.classList.add('active');
                } else {
                    opt.classList.remove('active');
                }
            });
        }

        document.addEventListener('click', function(e) {
            const switcher = document.getElementById('langSwitcher');
            if (switcher && !switcher.contains(e.target)) {
                switcher.classList.remove('open');
            }
        });

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            updateLangDisplay();
            updatePageText();
            checkReadonlyMode();
            loadExam();
        });
    </script>
